<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" role="img" aria-label="flatus menubar icon — italic f">
  <!-- macOS template image: only the alpha channel is used for tinting.
       The visible silhouette is the brand monogram — Charter italic 'f' —
       at menubar size. The actual PNG is generated by
       `scripts/render_tray_icon.py` because SVG <text> rendering depends on
       the rasterizer having access to Charter; the script uses Pillow with
       /System/Library/Fonts/Supplemental/Charter.ttc directly. -->
  <text x="11" y="18"
        text-anchor="middle"
        font-family="Charter, 'Iowan Old Style', Georgia, serif"
        font-style="italic"
        font-weight="400"
        font-size="32"
        fill="#000">f</text>
</svg>
