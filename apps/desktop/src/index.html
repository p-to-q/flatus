<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>flatus</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <header>
      <h1>flatus</h1>
      <p class="tagline">a small apparatus for moving air.</p>
    </header>

    <section class="row">
      <label for="personality">personality</label>
      <select id="personality">
        <option value="polite-cough">polite-cough</option>
        <option value="default" selected>default</option>
        <option value="biblical">biblical</option>
        <option value="silent-but-deadly">silent-but-deadly</option>
      </select>
    </section>

    <section class="row">
      <label for="volume">volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      <span id="volume-readout">100%</span>
    </section>

    <section class="row">
      <label for="output">output</label>
      <select id="output">
        <option value="headphones">headphones (default; safer cap)</option>
        <option value="speakers">speakers (−6 dBFS)</option>
      </select>
    </section>

    <section class="row">
      <label>quiet hours</label>
      <input type="number" id="quiet-start" min="0" max="23" placeholder="—" style="width: 3em;" />
      <span>→</span>
      <input type="number" id="quiet-end" min="0" max="23" placeholder="—" style="width: 3em;" />
    </section>

    <section class="actions">
      <button id="fart-now">fart now</button>
    </section>

    <footer>
      <p>tray click → fart. right-click → this panel.</p>
      <p>v0.1.0 · <code>[p → q]</code></p>
    </footer>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
