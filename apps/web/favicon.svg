<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f7f1e3"/>
      <stop offset="100%" stop-color="#efe7d2"/>
    </linearGradient>
    <radialGradient id="grain" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#7a2812" stop-opacity="0.95"/>
      <stop offset="30%"  stop-color="#8c2f1e" stop-opacity="0.82"/>
      <stop offset="70%"  stop-color="#c2533a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c2533a" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.0" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- paper canvas with rounded corners -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>

  <!-- HPF / LPF hairlines -->
  <line x1="8" y1="14" x2="56" y2="14" stroke="#8c2f1e" stroke-opacity="0.35"
        stroke-dasharray="2 3" stroke-width="0.7"/>
  <line x1="8" y1="54" x2="56" y2="54" stroke="#8c2f1e" stroke-opacity="0.35"
        stroke-dasharray="2 3" stroke-width="0.7"/>

  <!-- one bloomed oxblood grain — the apparatus, distilled -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="url(#grain)" filter="url(#bloom)"/>

  <!-- wisp envelope, ink -->
  <path d="M 8 28 C 18 22, 28 18, 38 22 S 56 30, 56 30"
        stroke="#1a1612" stroke-opacity="0.30" stroke-width="0.6" fill="none"/>
</svg>
