<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#15161b"/>
      <stop offset="100%" stop-color="#0f1014"/>
    </linearGradient>
    <radialGradient id="grain" cx="50%" cy="55%" r="55%">
      <stop offset="0%"  stop-color="#fff3d6" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#f5a26b" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ce552a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a2812" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark canvas with rounded corners -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>

  <!-- HPF/LPF rails -->
  <line x1="8" y1="14" x2="56" y2="14" stroke="#ce552a" stroke-opacity="0.35" stroke-dasharray="2 3" stroke-width="0.7"/>
  <line x1="8" y1="54" x2="56" y2="54" stroke="#ce552a" stroke-opacity="0.35" stroke-dasharray="2 3" stroke-width="0.7"/>

  <!-- one big bright grain — the apparatus, distilled -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="url(#grain)" filter="url(#bloom)"/>

  <!-- tiny envelope curve, the wisp -->
  <path d="M 8 28 C 18 22, 28 18, 38 22 S 56 30, 56 30"
        stroke="#fff3d6" stroke-opacity="0.35" stroke-width="0.6" fill="none"/>
</svg>
