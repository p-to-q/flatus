# rustfmt config for `flatus`.
#
# Conservative. The default rustfmt rules are fine for almost everything;
# we deviate only where the `ENGINEERING.md` doctrine asks us to.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
use_field_init_shorthand = true
use_try_shorthand = true
newline_style = "Unix"
imports_granularity = "Module"
group_imports = "StdExternalCrate"
