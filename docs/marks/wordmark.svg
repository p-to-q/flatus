<?xml version="1.0" encoding="UTF-8"?>
<!-- flatus / wordmark
     Primary brand mark. Italic Charter at 160 px on a transparent canvas with
     a single warm-orange hairline rule. Use for slide decks, presentations,
     internal docs, and anywhere a single-line brand reference is needed.
     Background is transparent — sits over light or dark surfaces unchanged. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="flatus">
  <defs>
    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#ce552a" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ce552a" stop-opacity="0.85"/>
      <stop offset="85%"  stop-color="#ce552a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ce552a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <text x="60" y="170"
        font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', Cambria, Georgia, serif"
        font-size="200" font-style="italic" font-weight="400"
        fill="#1a1612" letter-spacing="-2">flatus</text>
  <line x1="60" y1="200" x2="700" y2="200" stroke="url(#rule)" stroke-width="2"/>
  <text x="60" y="228"
        font-family="'Berkeley Mono', 'JetBrains Mono', 'SF Mono', Menlo, monospace"
        font-size="14" fill="#8d836d" letter-spacing="2.5">A SMALL APPARATUS FOR MOVING AIR</text>
</svg>
