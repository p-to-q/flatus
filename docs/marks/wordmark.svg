<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="flatus wordmark">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7f1e3"/><stop offset="100%" stop-color="#efe7d2"/></linearGradient>
<linearGradient id="rule" x1="0" x2="1" y1="0" y2="0"><stop offset="0%"   stop-color="#8c2f1e" stop-opacity="0"/><stop offset="15%"  stop-color="#8c2f1e" stop-opacity="0.88"/><stop offset="85%"  stop-color="#8c2f1e" stop-opacity="0.88"/><stop offset="100%" stop-color="#8c2f1e" stop-opacity="0"/></linearGradient>
<filter id="fingerprint" x="0%" y="0%" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="7" result="fine"/><feColorMatrix in="fine" values="0 0 0 0 0.10  0 0 0 0 0.085  0 0 0 0 0.07  0 0 0 0.18 0" result="fineLit"/><feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="1" seed="13" result="coarse"/><feColorMatrix in="coarse" values="0 0 0 0 0.10  0 0 0 0 0.085  0 0 0 0 0.07  0 0 0 0.08 0" result="coarseLit"/><feMerge><feMergeNode in="coarseLit"/><feMergeNode in="fineLit"/></feMerge></filter>
</defs>
<rect width="800" height="240" fill="url(#bg)"/>
<rect width="800" height="240" filter="url(#fingerprint)" opacity="0.6"/>
<text x="60" y="170" font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', 'Apple Garamond', Cambria, Georgia, serif" font-size="200" font-style="italic" font-weight="400" fill="#1a1612" letter-spacing="-2">flatus</text>
<line x1="60" y1="200" x2="700" y2="200" stroke="url(#rule)" stroke-width="2"/>
<text x="60" y="228" font-family="'Berkeley Mono', 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="14" fill="#6b5e4f" letter-spacing="2.5">A SMALL APPARATUS FOR MOVING AIR</text>
</svg>