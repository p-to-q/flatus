<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="flatus signature — six warm grains across a time strip">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7f1e3"/><stop offset="100%" stop-color="#efe7d2"/></linearGradient>
<radialGradient id="g" cx="50%" cy="50%" r="60%"><stop offset="0%"   stop-color="#7a2812"    stop-opacity="0.92"/><stop offset="30%"  stop-color="#8c2f1e" stop-opacity="0.78"/><stop offset="65%"  stop-color="#c2533a"    stop-opacity="0.42"/><stop offset="100%" stop-color="#c2533a"    stop-opacity="0"/></radialGradient>
<filter id="bloom" x="-60%" y="-100%" width="220%" height="300%"><feGaussianBlur stdDeviation="3"  result="b1"/><feGaussianBlur stdDeviation="10" in="SourceGraphic" result="b2"/><feGaussianBlur stdDeviation="20" in="SourceGraphic" result="b3"/><feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="fingerprint" x="0%" y="0%" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="0.44" numOctaves="2" seed="7" result="fine"/><feColorMatrix in="fine" values="0 0 0 0 0.10  0 0 0 0 0.085  0 0 0 0 0.07  0 0 0 0.16 0" result="fineLit"/><feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="1" seed="13" result="coarse"/><feColorMatrix in="coarse" values="0 0 0 0 0.10  0 0 0 0 0.085  0 0 0 0 0.07  0 0 0 0.08 0" result="coarseLit"/><feMerge><feMergeNode in="coarseLit"/><feMergeNode in="fineLit"/></feMerge></filter>
</defs>
<rect width="800" height="200" fill="url(#bg)"/>
<rect width="800" height="200" filter="url(#fingerprint)" opacity="0.6"/>
<g filter="url(#bloom)">
<ellipse cx="120" cy="100" rx="24" ry="32" fill="url(#g)" opacity="0.82"/>
<ellipse cx="230" cy="100" rx="34" ry="42" fill="url(#g)" opacity="0.96"/>
<ellipse cx="380" cy="100" rx="48" ry="56" fill="url(#g)" opacity="1.0"/>
<ellipse cx="530" cy="100" rx="40" ry="50" fill="url(#g)" opacity="0.97"/>
<ellipse cx="650" cy="100" rx="28" ry="38" fill="url(#g)" opacity="0.78"/>
<ellipse cx="740" cy="100" rx="18" ry="26" fill="url(#g)" opacity="0.54"/>
</g>
</svg>