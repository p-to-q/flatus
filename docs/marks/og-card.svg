<radialGradient id="ogVig" cx="50%" cy="55%" r="75%"><stop offset="55%" stop-color="#1a1612" stop-opacity="0"/><stop offset="100%" stop-color="#1a1612" stop-opacity="0.16"/></radialGradient>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
