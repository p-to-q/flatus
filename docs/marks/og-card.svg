<filter id="ogBloom" x="-60%" y="-80%" width="220%" height="260%"><feGaussianBlur stdDeviation="4"  result="ob1"/><feGaussianBlur stdDeviation="14" in="SourceGraphic" result="ob2"/><feGaussianBlur stdDeviation="28" in="SourceGraphic" result="ob3"/><feMerge><feMergeNode in="ob3"/><feMergeNode in="ob2"/><feMergeNode in="ob1"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
