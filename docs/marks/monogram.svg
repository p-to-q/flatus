<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="flatus monogram — italic f with three grains">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7f1e3"/><stop offset="100%" stop-color="#efe7d2"/></linearGradient>
<radialGradient id="gm" cx="50%" cy="50%" r="60%"><stop offset="0%"   stop-color="#7a2812"    stop-opacity="0.92"/><stop offset="30%"  stop-color="#8c2f1e" stop-opacity="0.78"/><stop offset="65%"  stop-color="#c2533a"    stop-opacity="0.42"/><stop offset="100%" stop-color="#c2533a"    stop-opacity="0"/></radialGradient>
<filter id="bloomM" x="-60%" y="-80%" width="220%" height="260%"><feGaussianBlur stdDeviation="2"  result="m1"/><feGaussianBlur stdDeviation="6"  in="SourceGraphic" result="m2"/><feGaussianBlur stdDeviation="14" in="SourceGraphic" result="m3"/><feMerge><feMergeNode in="m3"/><feMergeNode in="m2"/><feMergeNode in="m1"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="fingerprint" x="0%" y="0%" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="7" result="fine"/><feColorMatrix in="fine" values="0 0 0 0 0.10  0 0 0 0 0.085  0 0 0 0 0.07  0 0 0 0.20 0" result="fineLit"/><feMerge><feMergeNode in="fineLit"/></feMerge></filter>
</defs>
<rect width="240" height="240" rx="44" fill="url(#bg)"/>
<rect width="240" height="240" rx="44" filter="url(#fingerprint)" opacity="0.6"/>
<text x="60" y="172" font-family="Charter, 'Iowan Old Style', 'Source Serif Pro', 'Apple Garamond', Cambria, Georgia, serif" font-size="190" font-style="italic" font-weight="400" fill="#1a1612" letter-spacing="-2">f</text>
<g filter="url(#bloomM)">
<ellipse cx="130" cy="200" rx="9"  ry="13" fill="url(#gm)" opacity="0.88"/>
<ellipse cx="156" cy="200" rx="13" ry="17" fill="url(#gm)" opacity="0.98"/>
<ellipse cx="186" cy="200" rx="9"  ry="13" fill="url(#gm)" opacity="0.74"/>
</g>
</svg>