# flatus CI
#
# Two jobs:
#   1. `rust`  — fmt + clippy + test + build the fart-synth core on macOS + Linux.
#   2. `tauri` — build the unsigned desktop bundle: macOS .app, Linux .deb +
#                .AppImage; upload each as a per-OS artifact.
#
# v0.1 skips signing/notarization. v0.2 will add `tauri-action` with the
# Apple Developer ID secrets once we cross the broadcast threshold.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: rust · fmt + clippy + test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Linux audio headers
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-${{ matrix.os }}"

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (fart-synth)
        run: cargo clippy -p fart-synth --all-targets -- -D warnings

      - name: cargo test (fart-synth)
        run: cargo test -p fart-synth

      - name: cargo build --release (fart-synth)
        run: cargo build -p fart-synth --release

      - name: Run --help to confirm CLI links
        run: cargo run -p fart-synth --release --bin fart -- --help

  tauri:
    name: tauri · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libasound2-dev \
            build-essential \
            pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tauri-${{ matrix.os }}"

      - name: pnpm install
        working-directory: apps/desktop
        run: pnpm install || true # lockfile is optional in v0.1

      - name: tauri build (macOS unsigned)
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        # No APPLE_SIGNING_IDENTITY env: an empty string makes Tauri call
        # `codesign --sign ""`, which fails with "item not found in keychain".
        # tauri.conf.json `bundle.macOS.signingIdentity: null` already means
        # "skip codesign"; leaving the env unset lets that take effect.
        run: pnpm tauri build

      - name: tauri build (Linux deb + AppImage)
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/desktop
        # tauri.conf.json's bundle.targets ["app"] is macOS-only. Override on
        # Linux to produce a .deb and an .AppImage.
        run: pnpm tauri build --bundles deb,appimage

      - name: Zip the macOS .app
        if: matrix.os == 'macos-latest'
        working-directory: target/release/bundle/macos
        run: |
          if [ -d flatus.app ]; then
            zip -r flatus-unsigned-${{ github.sha }}.zip flatus.app
          fi

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'macos-latest'
        with:
          name: flatus-app-unsigned-macos
          path: target/release/bundle/macos/*.zip
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: flatus-bundles-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
